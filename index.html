<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillBox Finance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #f4f5f9; --bg-surface: #ffffff; --bg-sunken: #eef0f6; --bg-hover: #f0f1f7; --txt-primary: #0d0e14; --txt-secondary: #5a5f7a; --txt-muted: #9297b0; --border: #e3e5ef; --border-strong: #c8cbe0; --accent: #4f46e5; --accent-soft: #eeecfd; --accent-text: #3730a3; --green: #16a34a; --green-soft: #f0fdf4; --green-text: #14532d; --red: #dc2626; --red-soft: #fef2f2; --red-text: #7f1d1d; --amber: #d97706; --amber-soft: #fffbeb; --amber-text: #78350f; --shadow-sm: 0 1px 3px rgba(0,0,0,.06); --shadow-md: 0 4px 12px rgba(0,0,0,.06); --radius-sm: 8px; --radius-md: 12px; --nav-width: 220px; --transition: .18s ease;
  }
  [data-theme="dark"] {
    --bg-base: #0c0e16; --bg-surface: #131720; --bg-sunken: #0f1219; --bg-hover: #1a1f2e; --txt-primary: #e6e8f4; --txt-secondary: #7e86a8; --txt-muted: #40486a; --border: #1e2437; --border-strong: #2a3048; --accent: #818cf8; --accent-soft: #1e1b4b; --accent-text: #c7d2fe; --green: #4ade80; --green-soft: #052e16; --green-text: #bbf7d0; --red: #f87171; --red-soft: #1c0a0a; --red-text: #fecaca; --amber: #fbbf24; --amber-soft: #1c1200; --amber-text: #fde68a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg-base); color: var(--txt-primary); min-height: 100vh; }
  .layout { display: grid; grid-template-columns: var(--nav-width) 1fr; min-height: 100vh; }
  .sidebar { background: var(--bg-surface); border-right: 1px solid var(--border); padding: 24px 16px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; gap: 2px; }
  .logo { display: flex; align-items: center; gap: 10px; padding: 0 10px 24px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .logo-mark { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; }
  .nav-label { font-size: 10px; font-weight: 500; text-transform: uppercase; color: var(--txt-muted); padding: 12px 10px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13.5px; color: var(--txt-secondary); cursor: pointer; text-decoration: none; transition: all var(--transition); }
  .nav-item:hover { background: var(--bg-hover); color: var(--txt-primary); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent-text); font-weight: 500; }
  .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
  .main { padding: 28px 28px 40px; display: flex; flex-direction: column; gap: 20px; }
  .topbar { display: flex; justify-content: space-between; align-items: flex-start; }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-subtitle { font-size: 13px; color: var(--txt-muted); font-family: 'DM Mono', monospace; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .stat-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 18px 20px; box-shadow: var(--shadow-sm); position: relative; }
  .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }
  .stat-card.pending::after { background: var(--accent); }
  .stat-card.paid::after { background: var(--green); }
  .stat-card.overdue::after { background: var(--red); }
  .stat-card.total::after { background: var(--amber); }
  .stat-value { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; margin: 5px 0; }
  .table-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; font-size: 11px; text-transform: uppercase; color: var(--txt-muted); padding: 12px 20px; background: var(--bg-sunken); border-bottom: 1px solid var(--border); }
  td { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .status-select { padding: 4px 8px; border-radius: 20px; border: none; font-size: 12px; font-weight: 500; cursor: pointer; }
  .status-select.pending { background: var(--accent-soft); color: var(--accent-text); }
  .status-select.paid { background: var(--green-soft); color: var(--green-text); }
  .status-select.overdue { background: var(--red-soft); color: var(--red-text); }
  .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-surface); cursor: pointer; font-size: 13px; }
  .btn.primary { background: var(--accent); color: white; border: none; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
  input, select { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-sunken); color: var(--txt-primary); width: 100%; }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">S</div>
      <div><div class="logo-text">SkillBox</div><div class="logo-sub">Finance</div></div>
    </div>
    <div class="nav-label">Main</div>
    <div class="nav-item active" id="nav-dash" onclick="switchView('dash')">Dashboard</div>
    <div class="nav-item" id="nav-vendors" onclick="switchView('vendors')">Vendors</div>
    <div class="sidebar-footer">
        <button class="btn" onclick="toggleTheme()" style="width:100%">Toggle Theme</button>
    </div>
  </aside>

  <main class="main">
    <div id="dash-view">
      <div class="topbar">
        <div><div class="page-title">Payments Dashboard</div><div id="clock" class="page-subtitle">Loading...</div></div>
        <div style="display:flex; gap:10px">
            <button class="btn" onclick="exportCSV()">Export CSV</button>
            <button class="btn primary" onclick="loadData()">Sync Data</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card pending"><div>Pending</div><div class="stat-value" id="c-pending">₹0</div><div id="c-pending-count" class="page-subtitle">0 invoices</div></div>
        <div class="stat-card paid"><div>Cleared</div><div class="stat-value" id="c-paid">₹0</div><div id="c-paid-count" class="page-subtitle">0 invoices</div></div>
        <div class="stat-card overdue"><div>Overdue</div><div class="stat-value" id="c-overdue">₹0</div><div id="c-overdue-count" class="page-subtitle">0 invoices</div></div>
        <div class="stat-card total"><div>Records</div><div class="stat-value" id="c-count">0</div><div class="page-subtitle">All time</div></div>
      </div>

      <div class="table-card">
        <table>
          <thead><tr><th>Vendor</th><th>Item</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="stat-card" style="margin-top:20px">
        <div style="font-weight:600; margin-bottom:15px">Add New Payment</div>
        <div class="form-grid">
          <div><label class="nav-label">Vendor</label><select id="f-vendor" onchange="autoFill()"></select></div>
          <div><label class="nav-label">Item</label><input id="f-item" placeholder="Software"></div>
          <div><label class="nav-label">Amount</label><input id="f-amount" type="number" placeholder="0"></div>
          <div><label class="nav-label">Status</label><select id="f-status"><option>Pending</option><option>Paid</option><option>Overdue</option></select></div>
          <button class="btn primary" onclick="addPayment()">Add</button>
        </div>
        <div id="v-details" style="font-size:11px; color:var(--txt-muted); margin-top:10px; display:none"></div>
      </div>
    </div>

    <div id="vendors-view" style="display:none">
        <div class="topbar">
            <div><div class="page-title">Vendor Master</div><div class="page-subtitle">Bank Details List</div></div>
            <button class="btn primary" onclick="switchView('dash')">Back to Dash</button>
        </div>
        <div class="table-card" style="margin-top:20px">
            <table>
                <thead><tr><th>Vendor Name</th><th>Bank</th><th>Account</th><th>IFSC</th></tr></thead>
                <tbody id="v-tbody"></tbody>
            </table>
        </div>
    </div>
  </main>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzdKZhhak2ScyLU5ck47E8qc587sUHebUPcRoVhW7Gtsq2PXIKt7dIrB47UPSP2x7u0/exec";

let allData = [];
let allVendors = [];
let isDark = false;

// ── NAVIGATION ──
function switchView(view) {
    document.getElementById('dash-view').style.display = view === 'dash' ? 'block' : 'none';
    document.getElementById('vendors-view').style.display = view === 'vendors' ? 'block' : 'none';
    document.getElementById('nav-dash').classList.toggle('active', view === 'dash');
    document.getElementById('nav-vendors').classList.toggle('active', view === 'vendors');
    if(view === 'vendors') renderVendorTable();
}

// ── DATA LOADING ──
async function loadData() {
    try {
        const [billRes, vendRes] = await Promise.all([
            fetch(API_URL + "?action=getBills"),
            fetch(API_URL + "?action=getVendors")
        ]);
        const bills = await billRes.json();
        const vends = await vendRes.json();
        
        allData = bills.data.slice(1);
        allVendors = vends.data.slice(1);
        
        populateDropdown();
        renderTable();
    } catch (e) { console.error("Sync Error", e); }
}

function populateDropdown() {
    const sel = document.getElementById('f-vendor');
    sel.innerHTML = '<option value="">Select Vendor</option>';
    allVendors.forEach(v => {
        if(v[0]) sel.innerHTML += `<option value="${v[0]}">${v[0]}</option>`;
    });
}

function autoFill() {
    const val = document.getElementById('f-vendor').value;
    const v = allVendors.find(x => x[0] === val);
    const box = document.getElementById('v-details');
    if(v) {
        box.style.display = 'block';
        box.textContent = `Bank: ${v[1]} | Acc: ${v[2]} | IFSC: ${v[3]}`;
    } else { box.style.display = 'none'; }
}

// ── RENDER TABLES ──
function renderTable() {
    const tbody = document.getElementById('tbody');
    let pending = 0, paid = 0, overdue = 0;
    
    tbody.innerHTML = allData.map((row, i) => {
        const amt = Number(row[4]) || 0;
        const st = row[5] || "Pending";
        if(st === "Pending") pending += amt;
        if(st === "Paid") paid += amt;
        if(st === "Overdue") overdue += amt;

        return `<tr>
            <td style="font-weight:600">${row[1]}</td>
            <td>${row[2]}</td>
            <td style="font-family:DM Mono">₹${amt.toLocaleString('en-IN')}</td>
            <td><select class="status-select ${st.toLowerCase()}" onchange="updateStatus(${i+2}, this.value, this)">
                <option ${st==='Pending'?'selected':''}>Pending</option>
                <option ${st==='Paid'?'selected':''}>Paid</option>
                <option ${st==='Overdue'?'selected':''}>Overdue</option>
            </select></td>
        </tr>`;
    }).join('');

    document.getElementById('c-pending').textContent = '₹' + pending.toLocaleString('en-IN');
    document.getElementById('c-paid').textContent = '₹' + paid.toLocaleString('en-IN');
    document.getElementById('c-overdue').textContent = '₹' + overdue.toLocaleString('en-IN');
    document.getElementById('c-count').textContent = allData.length;
}

function renderVendorTable() {
    document.getElementById('v-tbody').innerHTML = allVendors.map(v => `
        <tr><td>${v[0]}</td><td>${v[1]}</td><td>${v[2]}</td><td>${v[3]}</td></tr>
    `).join('');
}

// ── ACTIONS ──
async function addPayment() {
    const v = document.getElementById('f-vendor').value;
    const it = document.getElementById('f-item').value;
    const am = document.getElementById('f-amount').value;
    const st = document.getElementById('f-status').value;
    if(!v || !am) return alert("Vendor and Amount are required");

    const vendInfo = allVendors.find(x => x[0] === v);
    const row = ["", v, it, "", am, st, vendInfo[1], vendInfo[2], vendInfo[3]];
    
    allData.push(row);
    renderTable();
    
    await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "addBill", row }) });
}

function updateStatus(rowIndex, status, el) {
    el.className = "status-select " + status.toLowerCase();
    fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "updateStatus", rowIndex, status }) });
}

function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
}

function exportCSV() {
    let csv = "Vendor,Item,Amount,Status\n";
    allData.forEach(r => csv += `${r[1]},${r[2]},${r[4]},${r[5]}\n`);
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('href', url);
    a.setAttribute('download', 'finance_report.csv');
    a.click();
}

// Init
setInterval(() => {
    const d = new Date();
    document.getElementById('clock').textContent = d.toLocaleDateString() + " | " + d.toLocaleTimeString();
}, 1000);
loadData();
</script>
</body>
</html>
