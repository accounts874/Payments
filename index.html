<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0d0d0d;
  color:#fff;
  display:flex;
}

/* SIDEBAR */

.sidebar{
  width:240px;
  height:100vh;
  background:#111;
  border-right:1px solid #222;
  padding:20px;
}

.logo{
  font-size:22px;
  font-weight:600;
  color:#ff7a00;
  margin-bottom:30px;
}

.menu a{
  display:block;
  color:#999;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  text-decoration:none;
}

.menu a:hover,
.menu a.active{
  background:#ff7a00;
  color:#000;
}

/* MAIN */

.main{
  flex:1;
  padding:25px;
}

/* HEADER */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header h1{
  font-size:32px;
}

.actions{
  display:flex;
  gap:10px;
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1e1e1e;
  color:#fff;
}

.btn.orange{
  background:#ff7a00;
  color:#000;
}

/* FILTERS */

.filters{
  margin-top:20px;
  display:flex;
  gap:10px;
  align-items:center;
}

.filter-btn{
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:#1c1c1c;
  color:#999;
  cursor:pointer;
}

.filter-btn.active{
  background:#ff7a00;
  color:#000;
}

.search{
  margin-left:auto;
  padding:10px 14px;
  width:260px;
  background:#1c1c1c;
  border:none;
  border-radius:20px;
  color:#fff;
}

/* CARDS */

.cards{
  margin-top:25px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:#161616;
  border:1px solid #222;
  border-radius:18px;
  padding:20px;
}

.card-title{
  color:#888;
  font-size:14px;
}

.card-value{
  margin-top:10px;
  font-size:30px;
  color:#ff7a00;
}

/* TABLE */

.table-box{
  margin-top:25px;
  background:#161616;
  border:1px solid #222;
  border-radius:18px;
  padding:20px;
}

.table-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  color:#777;
  font-size:13px;
  padding-bottom:15px;
}

td{
  padding:14px 0;
  border-bottom:1px solid #222;
}

.status{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  border:none;
}

.pending{
  background:#ff3d3d;
  color:#fff;
}

.paid{
  background:#00c853;
  color:#fff;
}

.overdue{
  background:#ff9100;
  color:#fff;
}

/* FORM */

.form-box{
  margin-top:25px;
  background:#161616;
  border:1px solid #222;
  border-radius:18px;
  padding:20px;
}

.form-box h2{
  margin-bottom:15px;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:#fff;
}

.submit-btn{
  margin-top:15px;
  background:#ff7a00;
  color:#000;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">Skill in a Box</div>

  <div class="menu">
    <a class="active">Dashboard</a>
    <a>Payments</a>
    <a>Vendors</a>
    <a>Invoices</a>
    <a>Analytics</a>
    <a>Settings</a>
  </div>

</div>

<!-- MAIN -->

<div class="main">

  <!-- HEADER -->

  <div class="header">
    <h1>Payments Dashboard</h1>

    <div class="actions">
      <button class="btn">Export</button>
      <button class="btn orange" onclick="loadData()">Refresh</button>
    </div>
  </div>

  <!-- FILTERS -->

  <div class="filters">

    <button class="filter-btn active" onclick="filterStatus('All')">All</button>

    <button class="filter-btn" onclick="filterStatus('Pending')">Pending</button>

    <button class="filter-btn" onclick="filterStatus('Paid')">Paid</button>

    <button class="filter-btn" onclick="filterStatus('Overdue')">Overdue</button>

    <input
      class="search"
      placeholder="Search vendor or item..."
      onkeyup="searchTable(this.value)"
    >

  </div>

  <!-- CARDS -->

  <div class="cards">

    <div class="card">
      <div class="card-title">Pending Amount</div>
      <div class="card-value" id="pending">₹0</div>
    </div>

    <div class="card">
      <div class="card-title">Paid Amount</div>
      <div class="card-value" id="paid">₹0</div>
    </div>

    <div class="card">
      <div class="card-title">Overdue Amount</div>
      <div class="card-value" id="overdue">₹0</div>
    </div>

    <div class="card">
      <div class="card-title">Invoices</div>
      <div class="card-value" id="count">0</div>
    </div>

  </div>

  <!-- TABLE -->

  <div class="table-box">

    <div class="table-header">
      <h2>All Transactions</h2>
    </div>

    <table>

      <thead>
        <tr>
          <th>Vendor</th>
          <th>Item</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="tbody"></tbody>

    </table>

  </div>

  <!-- ADD PAYMENT -->

  <div class="form-box">

    <h2>Add Payment</h2>

    <form onsubmit="addBill(event)">

      <div class="form-grid">

        <input id="vendor" placeholder="Vendor">

        <input id="item" placeholder="Item">

        <input id="amount" placeholder="Amount">

        <select id="status">
          <option>Pending</option>
          <option>Paid</option>
          <option>Overdue</option>
        </select>

      </div>

      <button class="submit-btn">Add Payment</button>

    </form>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzdKZhhak2ScyLU5ck47E8qc587sUHebUPcRoVhW7Gtsq2PXIKt7dIrB47UPSP2x7u0/exec";

let allData = [];
let currentFilter = "All";

/* LOAD DATA */

async function loadData(){

  const res = await fetch(API_URL + "?action=getBills");

  const json = await res.json();

  allData = json.data.slice(1);

  renderTable(allData);

}

/* RENDER */

function renderTable(data){

  let html = "";

  let pending = 0;
  let paid = 0;
  let overdue = 0;

  data.forEach((row,i)=>{

    const status = row[5];

    if(status=="Pending") pending += Number(row[4]);
    if(status=="Paid") paid += Number(row[4]);
    if(status=="Overdue") overdue += Number(row[4]);

    html += `
    <tr>
      <td>${row[1]}</td>
      <td>${row[2]}</td>
      <td>₹${row[4]}</td>
      <td>
        <select
          class="status ${status.toLowerCase()}"
          onchange="updateStatus(${i+2},this.value)"
        >
          <option ${status=="Pending"?"selected":""}>Pending</option>
          <option ${status=="Paid"?"selected":""}>Paid</option>
          <option ${status=="Overdue"?"selected":""}>Overdue</option>
        </select>
      </td>
    </tr>
    `;
  });

  tbody.innerHTML = html;

  pending.innerText = "₹" + pending;
  paid.innerText = "₹" + paid;
  overdue.innerText = "₹" + overdue;
  count.innerText = data.length;

}

/* ADD BILL */

async function addBill(e){

  e.preventDefault();

  const row = [
    new Date().toLocaleDateString(),
    vendor.value,
    item.value,
    "",
    amount.value,
    status.value
  ];

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"addBill",
      row
    })
  });

  vendor.value="";
  item.value="";
  amount.value="";

  loadData();

}

/* UPDATE STATUS */

async function updateStatus(rowIndex,status){

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"updateStatus",
      rowIndex,
      status
    })
  });

}

/* FILTER */

function filterStatus(status){

  currentFilter = status;

  document.querySelectorAll(".filter-btn")
    .forEach(btn=>btn.classList.remove("active"));

  event.target.classList.add("active");

  if(status=="All"){
    renderTable(allData);
  } else {
    renderTable(allData.filter(r=>r[5]==status));
  }

}

/* SEARCH */

function searchTable(value){

  value = value.toLowerCase();

  let filtered = allData.filter(r=>

    r[1].toLowerCase().includes(value) ||
    r[2].toLowerCase().includes(value)

  );

  if(currentFilter!="All"){
    filtered = filtered.filter(r=>r[5]==currentFilter);
  }

  renderTable(filtered);

}

loadData();

</script>

</body>
</html>
