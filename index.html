<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>

<style>
body { display:flex; background:#0c0c0c; color:#fff; font-family:Arial; }
.sidebar { width:220px; background:#111; padding:20px; }
.main { flex:1; padding:20px; }

.card {
  background:#151515;
  padding:15px;
  border-radius:10px;
  display:inline-block;
  width:23%;
  margin:5px;
}
.value { color:#ff7a00; font-size:22px; }

table { width:100%; margin-top:20px; border-collapse:collapse; }
td, th { padding:10px; border-bottom:1px solid #333; }

button {
  background:#ff7a00;
  border:none;
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Dashboard</h3>
</div>

<div class="main">

<h2>Payments Dashboard</h2>
<button onclick="loadData()">Refresh</button>

<!-- CARDS -->
<div>
  <div class="card">Pending <div id="pending" class="value">0</div></div>
  <div class="card">Paid <div id="paid" class="value">0</div></div>
  <div class="card">Invoices <div id="count" class="value">0</div></div>
  <div class="card">Overdue <div id="overdue" class="value">0</div></div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Vendor</th>
<th>Item</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- ADD FORM -->
<h3>Add Payment</h3>

<form onsubmit="addBill(event)">
<input id="vendor" placeholder="Vendor"><br><br>
<input id="item" placeholder="Item"><br><br>
<input id="amount" placeholder="Amount"><br><br>

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Overdue</option>
</select><br><br>

<button type="submit">Add</button>
</form>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzdKZhhak2ScyLU5ck47E8qc587sUHebUPcRoVhW7Gtsq2PXIKt7dIrB47UPSP2x7u0/exec";

// LOAD DATA
async function loadData() {
  const res = await fetch(API_URL + "?action=getBills");
  const data = await res.json();

  let html = "";
  let pending = 0, paid = 0, overdue = 0;

  data.slice(1).forEach((row, i) => {

    if(row[5] === "Pending") pending += Number(row[4]);
    if(row[5] === "Paid") paid += Number(row[4]);
    if(row[5] === "Overdue") overdue += Number(row[4]);

    html += `
    <tr>
      <td>${row[1]}</td>
      <td>${row[2]}</td>
      <td>₹${row[4]}</td>
      <td>
        <select onchange="updateStatus(${i+2}, this.value)">
          <option ${row[5]=='Pending'?'selected':''}>Pending</option>
          <option ${row[5]=='Paid'?'selected':''}>Paid</option>
          <option ${row[5]=='Overdue'?'selected':''}>Overdue</option>
        </select>
      </td>
    </tr>`;
  });

  document.getElementById("tbody").innerHTML = html;
  document.getElementById("pending").innerText = pending;
  document.getElementById("paid").innerText = paid;
  document.getElementById("overdue").innerText = overdue;
  document.getElementById("count").innerText = data.length - 1;
}

// ADD BILL
async function addBill(e) {
  e.preventDefault();

  const row = [
    new Date().toLocaleDateString(),
    vendor.value,
    item.value,
    "",
    amount.value,
    status.value
  ];

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "addBill",
      row
    })
  });

  loadData();
}

// UPDATE STATUS
async function updateStatus(rowIndex, status) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "updateStatus",
      rowIndex,
      status
    })
  });
}

// INIT
loadData();

</script>

</body>
</html>
