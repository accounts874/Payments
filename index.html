<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dash</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; }
        
        /* Sidebar */
        nav { width: 240px; height: 100vh; background: #020617; padding: 20px; position: fixed; }
        
        /* Main Content */
        main { margin-left: 280px; padding: 40px; width: 100%; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .card h3 { font-size: 0.8rem; color: #94a3b8; margin: 0; }
        .card p { font-size: 1.5rem; font-weight: bold; margin: 10px 0 0; }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; }

        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; }
        .btn { background: var(--accent); color: #000; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <nav>
        <h2>FinanceDash</h2>
        <p>Overview</p>
        <p>Bills</p>
        <p>Vendors</p>
    </nav>

    <main>
        <section class="grid">
            <div class="card"><h3>Pending</h3><p id="totalPending">$0</p></div>
            <div class="card"><h3>Paid</h3><p id="totalPaid">$0</p></div>
            <div class="card"><h3>Invoices</h3><p id="totalInvoices">0</p></div>
            <div class="card"><h3>Overdue</h3><p id="overdueAmount" style="color:#ef4444">$0</p></div>
        </section>

        <div style="margin-bottom: 20px; display: flex; gap: 10px;">
            <input type="text" id="searchInput" placeholder="Search bills..." onkeyup="filterTable()">
            <select id="statusFilter" onchange="filterTable()">
                <option value="All">All Status</option>
                <option value="Pending">Pending</option>
                <option value="Paid">Paid</option>
            </select>
        </div>

        <table id="billsTable">
            <thead>
                <tr>
                    <th>Vendor</th><th>Item</th><th>Category</th><th>Amount</th><th>Date</th><th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <hr style="margin: 40px 0; border: 0.5px solid #334155;">

        <h3>Add New Bill</h3>
        <form id="billForm" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
            <select id="vendorSelect" required onchange="autoFillVendorDetails()">
                <option value="">Select Vendor</option>
            </select>
            <input type="text" id="item" placeholder="Item" required>
            <input type="text" id="category" placeholder="Category">
            <input type="number" id="amount" placeholder="Amount" required>
            <input type="date" id="billDate" required>
            <input type="text" id="bankName" placeholder="Bank" readonly>
            <input type="text" id="accNum" placeholder="Account No" readonly>
            <input type="text" id="ifsc" placeholder="IFSC" readonly>
            <button type="submit" class="btn">Add Bill</button>
        </form>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzdKZhhak2ScyLU5ck47E8qc587sUHebUPcRoVhW7Gtsq2PXIKt7dIrB47UPSP2x7u0/exec';
        let bills = [];
        let vendors = [];

        async function fetchData() {
            const billRes = await fetch(`${API_URL}?action=getBills`);
            bills = await billRes.json();
            
            const vendorRes = await fetch(`${API_URL}?action=getVendors`);
            vendors = await vendorRes.json();

            populateVendors();
            renderDashboard();
        }

        function populateVendors() {
            const select = document.getElementById('vendorSelect');
            vendors.forEach(v => {
                let opt = document.createElement('option');
                opt.value = v.vendorname;
                opt.textContent = v.vendorname;
                select.appendChild(opt);
            });
        }

        function autoFillVendorDetails() {
            const name = document.getElementById('vendorSelect').value;
            const vendor = vendors.find(v => v.vendorname === name);
            if(vendor) {
                document.getElementById('bankName').value = vendor.bankname;
                document.getElementById('accNum').value = vendor.accountnumber;
                document.getElementById('ifsc').value = vendor.ifsccode;
            }
        }

        function renderDashboard() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let pending = 0, paid = 0;

            bills.forEach((bill, index) => {
                const amt = parseFloat(bill.amount);
                if(bill.status === 'Paid') paid += amt;
                else pending += amt;

                tbody.innerHTML += `
                    <tr>
                        <td>${bill.vendor}</td>
                        <td>${bill.item}</td>
                        <td>${bill.category}</td>
                        <td>$${amt}</td>
                        <td>${bill.date}</td>
                        <td>
                            <select onchange="updateStatus(${index}, this.value)">
                                <option ${bill.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option ${bill.status === 'Paid' ? 'selected' : ''}>Paid</option>
                            </select>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalPending').textContent = `$${pending.toLocaleString()}`;
            document.getElementById('totalPaid').textContent = `$${paid.toLocaleString()}`;
            document.getElementById('totalInvoices').textContent = bills.length;
        }

        document.getElementById('billForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                action: 'addBill',
                vendor: document.getElementById('vendorSelect').value,
                item: document.getElementById('item').value,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value,
                date: document.getElementById('billDate').value,
                status: 'Pending',
                bank: document.getElementById('bankName').value,
                account: document.getElementById('accNum').value,
                ifsc: document.getElementById('ifsc').value
            };

            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            alert('Bill Added!');
            fetchData();
        };

        window.onload = fetchData;
    </script>
</body>
</html>
