<!DOCTYPE html>
<html>
<head>
<title>Finance Dashboard</title>

<style>
body { background:#0f0f0f; color:#fff; font-family:Arial; display:flex; }
.sidebar { width:220px; background:#141414; padding:20px; }
.main { flex:1; padding:20px; }
.card { background:#1c1c1c; padding:15px; margin:10px; border-radius:10px; display:inline-block; width:22%; }
.value { color:orange; font-size:22px; }
table { width:100%; margin-top:20px; border-collapse: collapse; }
td, th { padding:10px; border-bottom:1px solid #333; }
button { padding:8px 12px; background:orange; border:none; cursor:pointer; }
</style>

</head>

<body>

<div class="sidebar">
  <h3>Dashboard</h3>
</div>

<div class="main">

<h2>Payments Dashboard</h2>
<button onclick="loadData()">Refresh</button>

<!-- CARDS -->
<div>
  <div class="card">Pending <div id="pending" class="value">0</div></div>
  <div class="card">Paid <div id="paid" class="value">0</div></div>
  <div class="card">Invoices <div id="count" class="value">0</div></div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Vendor</th>
<th>Item</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- ADD FORM -->
<h3>Add Payment</h3>

<form onsubmit="addBill(event)">
<input id="vendor" placeholder="Vendor"><br><br>
<input id="item" placeholder="Item"><br><br>
<input id="amount" placeholder="Amount"><br><br>

<select id="status">
<option>Pending</option>
<option>Paid</option>
</select><br><br>

<button type="submit">Add</button>
</form>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzdKZhhak2ScyLU5ck47E8qc587sUHebUPcRoVhW7Gtsq2PXIKt7dIrB47UPSP2x7u0/exec";

// LOAD DATA
async function loadData() {
  const res = await fetch(API + "?action=getBills");
  const data = await res.json();

  let tbody = "";
  let pending = 0, paid = 0;

  data.slice(1).forEach((row, i) => {
    if(row[5] === "Pending") pending += Number(row[4]);
    if(row[5] === "Paid") paid += Number(row[4]);

    tbody += `
    <tr>
      <td>${row[1]}</td>
      <td>${row[2]}</td>
      <td>${row[4]}</td>
      <td>
        <select onchange="updateStatus(${i+2}, this.value)">
          <option ${row[5]=='Pending'?'selected':''}>Pending</option>
          <option ${row[5]=='Paid'?'selected':''}>Paid</option>
        </select>
      </td>
    </tr>`;
  });

  document.getElementById("tbody").innerHTML = tbody;
  document.getElementById("pending").innerText = pending;
  document.getElementById("paid").innerText = paid;
  document.getElementById("count").innerText = data.length - 1;
}

// ADD BILL
async function addBill(e) {
  e.preventDefault();

  const row = [
    new Date().toLocaleDateString(),
    vendor.value,
    item.value,
    "",
    amount.value,
    status.value
  ];

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "addBill",
      data: row
    })
  });

  loadData();
}

// UPDATE STATUS
async function updateStatus(rowIndex, status) {
  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "updateStatus",
      rowIndex,
      status
    })
  });
}

// INITIAL LOAD
loadData();

</script>

</body>
</html>
