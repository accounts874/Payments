<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finance Debug Dashboard</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

button{
  background:orange;
  border:none;
  padding:10px;
  cursor:pointer;
}

.card{
  background:#1c1c1c;
  padding:20px;
  margin:10px 0;
  border-radius:10px;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th{
  border:1px solid #333;
  padding:10px;
}

#debug{
  background:#000;
  color:#0f0;
  padding:10px;
  margin-top:20px;
  height:250px;
  overflow:auto;
  border:1px solid #333;
}
</style>
</head>

<body>

<h1>Finance Dashboard DEBUG</h1>

<button onclick="loadData()">Load Data</button>

<div class="card">
  Pending: <span id="pending">0</span>
</div>

<div class="card">
  Paid: <span id="paid">0</span>
</div>

<div class="card">
  Invoices: <span id="count">0</span>
</div>

<table>
<thead>
<tr>
<th>Vendor</th>
<th>Item</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<h3>Debug Console</h3>

<div id="debug"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzdKZhhak2ScyLU5ck47E8qc587sUHebUPcRoVhW7Gtsq2PXIKt7dIrB47UPSP2x7u0/exec";

function log(msg){

  console.log(msg);

  document.getElementById("debug").innerHTML += "<br>" + JSON.stringify(msg);

}

async function loadData(){

  try {

    log("Loading data...");

    const url = API_URL + "?action=getBills";

    log(url);

    const response = await fetch(url);

    log("Response received");

    const json = await response.json();

    log(json);

    if(!json.success){

      log("Backend Error:");
      log(json.error || json.message);

      return;
    }

    const data = json.data;

    log("Rows found: " + data.length);

    let html = "";

    let pending = 0;
    let paid = 0;

    data.slice(1).forEach((row, i) => {

      log(row);

      if(row[5] === "Pending"){
        pending += Number(row[4]);
      }

      if(row[5] === "Paid"){
        paid += Number(row[4]);
      }

      html += `
      <tr>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[4]}</td>
        <td>${row[5]}</td>
      </tr>
      `;

    });

    document.getElementById("tbody").innerHTML = html;

    document.getElementById("pending").innerText = pending;

    document.getElementById("paid").innerText = paid;

    document.getElementById("count").innerText = data.length - 1;

    log("DONE");

  } catch(err){

    log("FRONTEND ERROR:");
    log(err.toString());

  }

}

</script>

</body>
</html>
